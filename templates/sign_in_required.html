<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Career Copilot — Sign in required</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root {
            --bg: #0b1020;
            --card-bg: #121826;
            --accent: #4f46e5;
            --accent-soft: rgba(79, 70, 229, 0.2);
            --border-subtle: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #111827 0, #020617 55%, #020617 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }
        .card {
            width: 100%;
            max-width: 440px;
            background: radial-gradient(circle at top left, rgba(79, 70, 229, 0.18), transparent 55%),
                        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.12), transparent 55%),
                        var(--card-bg);
            border-radius: 18px;
            border: 1px solid rgba(55, 65, 81, 0.8);
            padding: 28px 24px 24px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.8);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 600;
        }
        p {
            margin: 0 0 20px;
            font-size: 14px;
            line-height: 1.55;
            color: var(--text-muted);
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        a.btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            color: #e5e7eb;
            text-decoration: none;
            background: linear-gradient(135deg, #4f46e5, #8b5cf6);
            box-shadow: 0 10px 25px rgba(55, 48, 163, 0.55);
        }
        a.btn-primary:hover { filter: brightness(1.06); }
        a.btn-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            text-decoration: none;
            border: 1px solid var(--border-subtle);
            background: rgba(15, 23, 42, 0.85);
        }
        a.btn-secondary:hover {
            color: var(--text-main);
            border-color: var(--accent);
            background: var(--accent-soft);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>You are not signed in</h1>
        <p>Sign in to continue. After you authenticate, you will be redirected back to Career Copilot.</p>
        <div class="actions">
            <a class="btn-primary" href="/auth/login">Sign in</a>
            <a class="btn-secondary" href="/">Home</a>
        </div>
    </div>
</body>
</html>
