# Deploy container images to Azure Container Registry and roll matching Container Apps.
# Prereqs: ACR(s) + Container App(s) already exist (see docs/azure/CONTAINER_APPS_QUICKSTART.md).
#
# API (web app — repo-root Dockerfile):
#   Variables: AZURE_RESOURCE_GROUP, AZURE_CONTAINER_REGISTRY, AZURE_CONTAINER_APP_NAME
#   Optional: AZURE_CONTAINER_IMAGE_NAME (default: career-copilot-api)
#
# MCP server (mcp_server/Dockerfile) — optional second registry + app:
#   Variables: AZURE_MCP_CONTAINER_REGISTRY, AZURE_MCP_CONTAINER_APP_NAME
#   Optional: AZURE_MCP_RESOURCE_GROUP — resource group of the MCP Container App
#     (defaults to AZURE_RESOURCE_GROUP if unset)
#   Optional: AZURE_MCP_ACR_RESOURCE_GROUP — resource group that contains the MCP ACR
#     (defaults to the MCP app RG above if unset)
#   Optional: AZURE_MCP_CONTAINER_IMAGE_NAME (default: career-copilot-mcp)
#   The MCP job is skipped unless both AZURE_MCP_CONTAINER_REGISTRY and
#   AZURE_MCP_CONTAINER_APP_NAME are set.
#
# Ingestion (scripts/ingestion/Dockerfile) — optional scheduled Container App / Job:
#   Variable: AZURE_INGESTION_CONTAINER_APP_NAME (name of the Container App or Container Apps Job)
#   Optional: AZURE_INGESTION_CONTAINER_REGISTRY (defaults to AZURE_CONTAINER_REGISTRY)
#   Optional: AZURE_INGESTION_RESOURCE_GROUP (defaults to AZURE_RESOURCE_GROUP)
#   Optional: AZURE_INGESTION_ACR_RESOURCE_GROUP (resource group that holds the ACR; defaults to AZURE_RESOURCE_GROUP)
#   Optional: AZURE_INGESTION_CONTAINER_IMAGE_NAME (default: career-copilot-ingestion-job)
#   Optional: AZURE_INGESTION_CONTAINER_TYPE — "app" (default) or "job" for az containerapp vs containerapp job
#   Skipped if AZURE_INGESTION_CONTAINER_APP_NAME is unset.
#
# Embedding worker (scripts/job_embeddings_worker/Dockerfile) — optional scheduled App / Job:
#   Variable: AZURE_EMBEDDING_WORKER_CONTAINER_APP_NAME
#   Optional: AZURE_EMBEDDING_WORKER_CONTAINER_REGISTRY (defaults to AZURE_CONTAINER_REGISTRY)
#   Optional: AZURE_EMBEDDING_WORKER_RESOURCE_GROUP (defaults to AZURE_RESOURCE_GROUP)
#   Optional: AZURE_EMBEDDING_WORKER_ACR_RESOURCE_GROUP (defaults to AZURE_RESOURCE_GROUP)
#   Optional: AZURE_EMBEDDING_WORKER_CONTAINER_IMAGE_NAME (default: career-copilot-embeddings-worker)
#   Optional: AZURE_EMBEDDING_WORKER_CONTAINER_TYPE — "app" or "job" (default: app)
#   Skipped if AZURE_EMBEDDING_WORKER_CONTAINER_APP_NAME is unset.
#
# Example (dev — both targets are Container Apps *Jobs* in rg-careercopilot-dev):
#   AZURE_INGESTION_CONTAINER_APP_NAME=career-copilot-ingestion-job
#   AZURE_INGESTION_CONTAINER_TYPE=job
#   AZURE_INGESTION_RESOURCE_GROUP=rg-careercopilot-dev
#   AZURE_EMBEDDING_WORKER_CONTAINER_APP_NAME=career-copilot-embedding-worker
#   AZURE_EMBEDDING_WORKER_CONTAINER_TYPE=job
#   AZURE_EMBEDDING_WORKER_RESOURCE_GROUP=rg-careercopilot-dev
#   (If the ACR lives in the same RG as the API, leave ACR_* overrides unset.)
#
# Secrets (OIDC): AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID

name: deploy-azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy_api:
    name: API — build and update Container App
    runs-on: ubuntu-latest
    env:
      AZURE_CONTAINER_IMAGE_NAME: ${{ vars.AZURE_CONTAINER_IMAGE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image variables
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="${AZURE_CONTAINER_IMAGE_NAME:-career-copilot-api}"
          REGISTRY="${{ vars.AZURE_CONTAINER_REGISTRY }}"
          RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          APP="${{ vars.AZURE_CONTAINER_APP_NAME }}"
          if [[ -z "$REGISTRY" || -z "$RG" || -z "$APP" ]]; then
            echo "::error::Set Actions variables AZURE_CONTAINER_REGISTRY, AZURE_RESOURCE_GROUP, and AZURE_CONTAINER_APP_NAME."
            exit 1
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "registry_login_server=${REGISTRY}.azurecr.io" >> "$GITHUB_OUTPUT"

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Build and push image (ACR Tasks)
        run: |
          set -euo pipefail
          REGISTRY="${{ vars.AZURE_CONTAINER_REGISTRY }}"
          IMAGE="${{ steps.cfg.outputs.image_name }}"
          SHA_TAG="${{ steps.cfg.outputs.short_sha }}"
          az acr build \
            -g "${{ vars.AZURE_RESOURCE_GROUP }}" \
            -r "$REGISTRY" \
            -t "${IMAGE}:${SHA_TAG}" \
            -t "${IMAGE}:latest" \
            .

      - name: Update Container App revision
        run: |
          set -euo pipefail
          IMAGE="${{ steps.cfg.outputs.image_name }}"
          TAG="${{ steps.cfg.outputs.short_sha }}"
          FULL_IMAGE="${{ steps.cfg.outputs.registry_login_server }}/${IMAGE}:${TAG}"
          az containerapp update \
            -g "${{ vars.AZURE_RESOURCE_GROUP }}" \
            -n "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --image "$FULL_IMAGE"

  deploy_ingestion:
    name: Ingestion — build and update Container App / Job
    if: ${{ vars.AZURE_INGESTION_CONTAINER_APP_NAME != '' }}
    runs-on: ubuntu-latest
    env:
      AZURE_INGESTION_CONTAINER_IMAGE_NAME: ${{ vars.AZURE_INGESTION_CONTAINER_IMAGE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image variables
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="${AZURE_INGESTION_CONTAINER_IMAGE_NAME:-career-copilot-ingestion-job}"
          REGISTRY_ING="${{ vars.AZURE_INGESTION_CONTAINER_REGISTRY }}"
          REGISTRY_API="${{ vars.AZURE_CONTAINER_REGISTRY }}"
          REGISTRY="${REGISTRY_ING:-$REGISTRY_API}"
          API_RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          APP_RG_INPUT="${{ vars.AZURE_INGESTION_RESOURCE_GROUP }}"
          APP_RG="${APP_RG_INPUT:-$API_RG}"
          ACR_RG_INPUT="${{ vars.AZURE_INGESTION_ACR_RESOURCE_GROUP }}"
          ACR_RG="${ACR_RG_INPUT:-$API_RG}"
          APP="${{ vars.AZURE_INGESTION_CONTAINER_APP_NAME }}"
          KIND_RAW="${{ vars.AZURE_INGESTION_CONTAINER_TYPE }}"
          KIND="${KIND_RAW:-app}"
          KIND="${KIND,,}"
          if [[ -z "$REGISTRY" || -z "$ACR_RG" || -z "$APP_RG" || -z "$APP" ]]; then
            echo "::error::Ingestion deploy: set AZURE_INGESTION_CONTAINER_APP_NAME and ensure AZURE_CONTAINER_REGISTRY (or AZURE_INGESTION_CONTAINER_REGISTRY) and AZURE_RESOURCE_GROUP are set."
            exit 1
          fi
          if [[ "$KIND" != "app" && "$KIND" != "job" ]]; then
            echo "::error::AZURE_INGESTION_CONTAINER_TYPE must be 'app' or 'job' (got: $KIND_RAW)"
            exit 1
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "registry_login_server=${REGISTRY}.azurecr.io" >> "$GITHUB_OUTPUT"
          echo "app_resource_group=$APP_RG" >> "$GITHUB_OUTPUT"
          echo "acr_resource_group=$ACR_RG" >> "$GITHUB_OUTPUT"
          echo "deploy_kind=$KIND" >> "$GITHUB_OUTPUT"

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Build and push ingestion image (ACR Tasks)
        run: |
          set -euo pipefail
          REGISTRY="${{ vars.AZURE_INGESTION_CONTAINER_REGISTRY }}"
          REGISTRY="${REGISTRY:-${{ vars.AZURE_CONTAINER_REGISTRY }}}"
          IMAGE="${{ steps.cfg.outputs.image_name }}"
          SHA_TAG="${{ steps.cfg.outputs.short_sha }}"
          ACR_RG="${{ steps.cfg.outputs.acr_resource_group }}"
          az acr build \
            -g "$ACR_RG" \
            -r "$REGISTRY" \
            -f scripts/ingestion/Dockerfile \
            -t "${IMAGE}:${SHA_TAG}" \
            -t "${IMAGE}:latest" \
            .

      - name: Update ingestion Container App or Job
        run: |
          set -euo pipefail
          IMAGE="${{ steps.cfg.outputs.image_name }}"
          TAG="${{ steps.cfg.outputs.short_sha }}"
          FULL_IMAGE="${{ steps.cfg.outputs.registry_login_server }}/${IMAGE}:${TAG}"
          KIND="${{ steps.cfg.outputs.deploy_kind }}"
          APP_RG="${{ steps.cfg.outputs.app_resource_group }}"
          APP="${{ vars.AZURE_INGESTION_CONTAINER_APP_NAME }}"
          if [[ "$KIND" == "job" ]]; then
            az containerapp job update -g "$APP_RG" -n "$APP" --image "$FULL_IMAGE"
          else
            az containerapp update -g "$APP_RG" -n "$APP" --image "$FULL_IMAGE"
          fi

  deploy_embedding_worker:
    name: Embedding worker — build and update Container App / Job
    if: ${{ vars.AZURE_EMBEDDING_WORKER_CONTAINER_APP_NAME != '' }}
    runs-on: ubuntu-latest
    env:
      AZURE_EMBEDDING_WORKER_CONTAINER_IMAGE_NAME: ${{ vars.AZURE_EMBEDDING_WORKER_CONTAINER_IMAGE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image variables
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="${AZURE_EMBEDDING_WORKER_CONTAINER_IMAGE_NAME:-career-copilot-embeddings-worker}"
          REGISTRY_W="${{ vars.AZURE_EMBEDDING_WORKER_CONTAINER_REGISTRY }}"
          REGISTRY_API="${{ vars.AZURE_CONTAINER_REGISTRY }}"
          REGISTRY="${REGISTRY_W:-$REGISTRY_API}"
          API_RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          APP_RG_INPUT="${{ vars.AZURE_EMBEDDING_WORKER_RESOURCE_GROUP }}"
          APP_RG="${APP_RG_INPUT:-$API_RG}"
          ACR_RG_INPUT="${{ vars.AZURE_EMBEDDING_WORKER_ACR_RESOURCE_GROUP }}"
          ACR_RG="${ACR_RG_INPUT:-$API_RG}"
          APP="${{ vars.AZURE_EMBEDDING_WORKER_CONTAINER_APP_NAME }}"
          KIND_RAW="${{ vars.AZURE_EMBEDDING_WORKER_CONTAINER_TYPE }}"
          KIND="${KIND_RAW:-app}"
          KIND="${KIND,,}"
          if [[ -z "$REGISTRY" || -z "$ACR_RG" || -z "$APP_RG" || -z "$APP" ]]; then
            echo "::error::Embedding worker deploy: set AZURE_EMBEDDING_WORKER_CONTAINER_APP_NAME and ensure AZURE_CONTAINER_REGISTRY (or AZURE_EMBEDDING_WORKER_CONTAINER_REGISTRY) and AZURE_RESOURCE_GROUP are set."
            exit 1
          fi
          if [[ "$KIND" != "app" && "$KIND" != "job" ]]; then
            echo "::error::AZURE_EMBEDDING_WORKER_CONTAINER_TYPE must be 'app' or 'job' (got: $KIND_RAW)"
            exit 1
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "registry_login_server=${REGISTRY}.azurecr.io" >> "$GITHUB_OUTPUT"
          echo "app_resource_group=$APP_RG" >> "$GITHUB_OUTPUT"
          echo "acr_resource_group=$ACR_RG" >> "$GITHUB_OUTPUT"
          echo "deploy_kind=$KIND" >> "$GITHUB_OUTPUT"

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Build and push embedding worker image (ACR Tasks)
        run: |
          set -euo pipefail
          REGISTRY="${{ vars.AZURE_EMBEDDING_WORKER_CONTAINER_REGISTRY }}"
          REGISTRY="${REGISTRY:-${{ vars.AZURE_CONTAINER_REGISTRY }}}"
          IMAGE="${{ steps.cfg.outputs.image_name }}"
          SHA_TAG="${{ steps.cfg.outputs.short_sha }}"
          ACR_RG="${{ steps.cfg.outputs.acr_resource_group }}"
          az acr build \
            -g "$ACR_RG" \
            -r "$REGISTRY" \
            -f scripts/job_embeddings_worker/Dockerfile \
            -t "${IMAGE}:${SHA_TAG}" \
            -t "${IMAGE}:latest" \
            .

      - name: Update embedding worker Container App or Job
        run: |
          set -euo pipefail
          IMAGE="${{ steps.cfg.outputs.image_name }}"
          TAG="${{ steps.cfg.outputs.short_sha }}"
          FULL_IMAGE="${{ steps.cfg.outputs.registry_login_server }}/${IMAGE}:${TAG}"
          KIND="${{ steps.cfg.outputs.deploy_kind }}"
          APP_RG="${{ steps.cfg.outputs.app_resource_group }}"
          APP="${{ vars.AZURE_EMBEDDING_WORKER_CONTAINER_APP_NAME }}"
          if [[ "$KIND" == "job" ]]; then
            az containerapp job update -g "$APP_RG" -n "$APP" --image "$FULL_IMAGE"
          else
            az containerapp update -g "$APP_RG" -n "$APP" --image "$FULL_IMAGE"
          fi

  deploy_mcp:
    name: MCP — build and update Container App
    if: ${{ vars.AZURE_MCP_CONTAINER_REGISTRY != '' && vars.AZURE_MCP_CONTAINER_APP_NAME != '' }}
    runs-on: ubuntu-latest
    env:
      AZURE_MCP_CONTAINER_IMAGE_NAME: ${{ vars.AZURE_MCP_CONTAINER_IMAGE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image variables
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_NAME="${AZURE_MCP_CONTAINER_IMAGE_NAME:-career-copilot-mcp}"
          REGISTRY="${{ vars.AZURE_MCP_CONTAINER_REGISTRY }}"
          API_RG="${{ vars.AZURE_RESOURCE_GROUP }}"
          MCP_APP_RG="${{ vars.AZURE_MCP_RESOURCE_GROUP }}"
          APP_RG="${MCP_APP_RG:-$API_RG}"
          MCP_ACR_RG_INPUT="${{ vars.AZURE_MCP_ACR_RESOURCE_GROUP }}"
          ACR_RG="${MCP_ACR_RG_INPUT:-$APP_RG}"
          APP="${{ vars.AZURE_MCP_CONTAINER_APP_NAME }}"
          if [[ -z "$REGISTRY" || -z "$APP_RG" || -z "$APP" || -z "$ACR_RG" ]]; then
            echo "::error::MCP deploy: set AZURE_MCP_CONTAINER_REGISTRY and AZURE_MCP_CONTAINER_APP_NAME; set AZURE_RESOURCE_GROUP (or AZURE_MCP_RESOURCE_GROUP) so the MCP app resource group is known."
            exit 1
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "registry_login_server=${REGISTRY}.azurecr.io" >> "$GITHUB_OUTPUT"
          echo "app_resource_group=$APP_RG" >> "$GITHUB_OUTPUT"
          echo "acr_resource_group=$ACR_RG" >> "$GITHUB_OUTPUT"

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Build and push MCP image (ACR Tasks)
        run: |
          set -euo pipefail
          REGISTRY="${{ vars.AZURE_MCP_CONTAINER_REGISTRY }}"
          IMAGE="${{ steps.cfg.outputs.image_name }}"
          SHA_TAG="${{ steps.cfg.outputs.short_sha }}"
          ACR_RG="${{ steps.cfg.outputs.acr_resource_group }}"
          az acr build \
            -g "$ACR_RG" \
            -r "$REGISTRY" \
            -f mcp_server/Dockerfile \
            -t "${IMAGE}:${SHA_TAG}" \
            -t "${IMAGE}:latest" \
            .

      - name: Update MCP Container App revision
        run: |
          set -euo pipefail
          IMAGE="${{ steps.cfg.outputs.image_name }}"
          TAG="${{ steps.cfg.outputs.short_sha }}"
          FULL_IMAGE="${{ steps.cfg.outputs.registry_login_server }}/${IMAGE}:${TAG}"
          az containerapp update \
            -g "${{ steps.cfg.outputs.app_resource_group }}" \
            -n "${{ vars.AZURE_MCP_CONTAINER_APP_NAME }}" \
            --image "$FULL_IMAGE"
