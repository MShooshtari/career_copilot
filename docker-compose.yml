version: "3.3"
services:
  postgres:
    image:  postgres:16-bullseye
    container_name: career_copilot_postgres
    environment:
      POSTGRES_DB: career_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
