version: "3.3"
services:
  postgres:
    # Includes pgvector (same major as local Postgres for dev parity)
    image: pgvector/pgvector:pg16
    container_name: career_copilot_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-career_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optional: run the API container locally for parity with Azure.
  # docker compose up -d postgres
  # docker compose up --build api
  api:
    build: .
    container_name: career_copilot_api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-career_copilot}
      POSTGRES_SSLMODE: disable
      AUTH_ENABLED: "0"
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
